<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertemuan 2: Class & Encapsulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #f8fafc; color: #334155; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-8 h-screen flex flex-col overflow-hidden">

    <div class="max-w-7xl mx-auto w-full flex flex-col h-full">
        <!-- HEADER -->
        <div class="mb-6 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Gudang & Suku Cadang</h1>
            </div>
        </div>

        <!-- MAIN GUDANG SECTION (Sama persis dengan Original) -->
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8 flex-1 min-h-0">
            <div class="xl:col-span-2 flex flex-col gap-6 h-full min-h-0">
                <!-- FORM INPUT -->
                <div id="gudang-action-form" class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-wrap items-end gap-3 shrink-0">
                    <input type="hidden" id="part-id-edit">
                    <div class="w-32">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">Kode Suku Cadang</label>
                        <input type="text" id="part-kode" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-bold uppercase text-sm" placeholder="Otomatis">
                    </div>
                    <div class="flex-1 min-w-[150px]">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">Nama / Item Barang</label>
                        <input type="text" id="part-nama" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-semibold text-sm" placeholder="Contoh: Oli Mesin">
                    </div>
                    <div class="w-20">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">Stok</label>
                        <input type="number" id="part-stok" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-center font-bold outline-none focus:border-blue-500 text-sm" placeholder="0">
                    </div>
                    <div class="w-32">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">Harga (Rp)</label>
                        <input type="number" id="part-harga" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-blue-600 font-bold outline-none focus:border-blue-500 text-sm" placeholder="0">
                    </div>
                    <div class="flex gap-2 mb-[1px]">
                        <button type="button" id="btn-save-part" onclick="app.handlePartSubmit()" class="bg-blue-600 text-white px-6 py-3.5 rounded-xl font-black hover:bg-blue-700 shadow-lg transition-all text-sm">Tambah</button>
                        <button type="button" id="btn-cancel-part" onclick="app.resetPartForm()" class="bg-slate-100 text-slate-500 px-4 py-3.5 rounded-xl font-black hover:bg-slate-200 transition-all hidden"><i class="fa-solid fa-times"></i></button>
                    </div>
                </div>
                
                <!-- TABLE DATA -->
                <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden flex flex-col flex-1 min-h-0">
                    <div class="p-6 border-b border-slate-50 flex flex-wrap justify-between items-center gap-4 bg-slate-50/30 shrink-0">
                        <h3 class="font-bold text-slate-800">Daftar Inventaris</h3>
                        <div class="relative w-full sm:w-auto">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="search-stok" oninput="app.renderStok()" placeholder="Cari kode atau nama barang..." class="pl-11 p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 text-sm w-full sm:w-72 font-medium transition-all shadow-sm">
                        </div>
                    </div>
                    <div class="overflow-y-auto flex-1">
                        <table class="w-full text-left relative">
                            <thead class="bg-slate-50/90 backdrop-blur-sm text-slate-400 text-[10px] font-bold uppercase tracking-widest border-b border-slate-100 sticky top-0 z-10">
                                <tr><th class="px-6 py-4">Item Sparepart</th><th class="px-6 py-4 text-center">Stok Fisik</th><th class="px-6 py-4 text-right">Harga Satuan</th><th class="px-6 py-4 text-center">Aksi</th></tr>
                            </thead>
                            <tbody id="table-stok-data" class="text-sm font-medium"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- LOG LIFO -->
            <div class="bg-slate-900 rounded-3xl p-8 text-white h-full shadow-2xl relative overflow-hidden flex flex-col">
                <div class="absolute -right-5 -top-5 opacity-10 text-9xl rotate-12"><i class="fa-solid fa-boxes-stacked"></i></div>
                <h3 class="font-bold text-blue-400 mb-6 border-b border-slate-700/50 pb-5 flex items-center gap-2 relative z-10 shrink-0">
                    <i class="fa-solid fa-history"></i> Log Keluar Masuk Barang
                </h3>
                <div id="stack-lifo-container" class="space-y-6 relative z-10 flex-1 overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <!-- STOK MODAL -->
    <div id="modal-stok" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden items-center justify-center transition-opacity">
        <div class="bg-white p-8 rounded-3xl w-[350px] shadow-2xl border border-slate-100">
            <h3 class="font-black text-xl mb-1 text-slate-800">Restok Gudang</h3>
            <p id="restok-label" class="text-xs text-slate-500 mb-6 font-bold uppercase"></p>
            <input type="hidden" id="restok-id">
            <input type="number" id="restok-qty" value="1" min="1" class="w-full p-4 border border-slate-200 rounded-xl mb-6 text-center font-black text-3xl bg-slate-50 outline-none text-blue-600 focus:border-blue-500">
            <div class="flex gap-3">
                <button onclick="app.closeStokModal()" class="flex-1 py-3.5 bg-slate-100 text-slate-500 font-bold rounded-xl hover:bg-slate-200 transition-all">Batal</button>
                <button onclick="app.prosesRestok()" class="flex-1 bg-blue-600 text-white font-black py-3.5 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Push</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
